name: Publish Canary

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}

      - name: Build release app
        env:
          BACKEND_URL: https://agent.invalid
          INSTALLER_TOKEN: ci-installer-token
        run: pnpm run agent:release

      - name: Package linux artifact
        run: |
          rm -rf /tmp/agent-linux-x64
          mkdir -p /tmp/agent-linux-x64
          cp -R release/app/. /tmp/agent-linux-x64
          test -f /tmp/agent-linux-x64/node_modules/@supabase/supabase-js/package.json
          ABSOLUTE_SYMLINK_COUNT="$(find /tmp/agent-linux-x64/node_modules -type l -exec readlink {} \; | awk '/^\//{c++} END {print c+0}')"
          if [ "$ABSOLUTE_SYMLINK_COUNT" -gt 0 ]; then
            echo "Found $ABSOLUTE_SYMLINK_COUNT absolute symlink(s) in Linux runtime node_modules." >&2
            find /tmp/agent-linux-x64/node_modules -type l -exec readlink {} \; | awk '/^\//{print; if (++n==20) exit}' >&2
            exit 1
          fi
          tar -C /tmp -czf agent-linux-x64.tar.gz agent-linux-x64
          sha256sum agent-linux-x64.tar.gz | awk '{print $1}' > agent-linux-x64.sha256

      - name: Package windows artifact
        run: |
          rm -rf /tmp/agent-windows-x64
          mkdir -p /tmp/agent-windows-x64
          cp -R release/app/. /tmp/agent-windows-x64
          test -f /tmp/agent-windows-x64/node_modules/@supabase/supabase-js/package.json
          (
            cd /tmp
            zip -qr "${GITHUB_WORKSPACE}/agent-windows-x64.zip" agent-windows-x64
          )
          sha256sum agent-windows-x64.zip | awk '{print $1}' > agent-windows-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-assets
          path: |
            agent-linux-x64.tar.gz
            agent-linux-x64.sha256
            agent-windows-x64.zip
            agent-windows-x64.sha256
          if-no-files-found: error

  publish-release:
    needs: build-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-release-assets
          path: .

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent/v${{ inputs.version }}
          name: Agent v${{ inputs.version }} (canary)
          prerelease: true
          files: |
            agent-linux-x64.tar.gz
            agent-linux-x64.sha256
            agent-windows-x64.zip
            agent-windows-x64.sha256

      - name: Generate canary manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CHECKSUM="$(awk '{print $1}' agent-linux-x64.sha256)"
          WINDOWS_CHECKSUM="$(awk '{print $1}' agent-windows-x64.sha256)"
          LINUX_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/agent/v${VERSION}/agent-linux-x64.tar.gz"
          WINDOWS_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/agent/v${VERSION}/agent-windows-x64.zip"
          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          mkdir -p agent-manifests
          cat > agent-manifests/canary.json <<EOF
          {
            "channel": "canary",
            "version": "${VERSION}",
            "platforms": {
              "linux-x64": {
                "url": "${LINUX_DOWNLOAD_URL}",
                "checksum": "${CHECKSUM}"
              },
              "windows-x64": {
                "url": "${WINDOWS_DOWNLOAD_URL}",
                "checksum": "${WINDOWS_CHECKSUM}"
              }
            },
            "published_at": "${PUBLISHED_AT}"
          }
          EOF

      - name: Commit canary manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git diff --quiet -- agent-manifests/canary.json; then
            echo "No manifest changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent-manifests/canary.json
          git commit -m "chore(agent): publish canary ${VERSION}"
          git push origin main
